<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TafoChat</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@800&family=VT323&family=Orbitron:wght@400;700&family=Pacifico&family=Rajdhani:wght@400;600&family=Bangers&family=Caveat:wght@500&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root {
  --bg: #000000;
  --panel: #040d1c;
  --border: #0d2040;
  --ctrl: #000000;
  --text: #ffffff;
  --sub: #7a8fa8;
  --acc: #3a7bd5;
  --adim: #5a9fd8;
  --mebg: #0a2448;
  --mec: #ffffff;
  --thbg: #040d1c;
  --thc: #c8ddf0;
  --jbg: #3a7bd5;
  --jc: #ffffff;
  --ol: 0px;
  --glow: 0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body, html { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }

/* Modal */
#um {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.92);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.mb {
  background: var(--panel);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 24px 20px;
  width: 100%; max-width: 320px;
  display: flex; flex-direction: column; gap: 14px;
  text-align: center;
}
.mb h2 { font-size: 1.1rem; font-weight: 700; color: var(--text); letter-spacing: .04em; }
.warn-banner {
  border-left: 3px solid var(--acc);
  background: rgba(58,123,213,.08);
  padding: 7px 10px;
  border-radius: 0 6px 6px 0;
  font-size: .70rem;
  color: #8db8e8;
  line-height: 1.5;
  text-align: left;
}
.warn-banner strong {
  display: block;
  font-weight: 800;
  color: var(--acc);
  font-size: .62rem;
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 2px;
}
#ui {
  background: var(--bg);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 1rem;
  font-family: inherit;
  outline: none;
  text-align: center;
  width: 100%;
}
#jb {
  background: var(--acc);
  color: #fff;
  border: none;
  padding: 12px;
  border-radius: 8px;
  font-size: .95rem;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
}
#jb:hover { filter: brightness(1.15); }
.color-label { font-size: .65rem; color: var(--sub); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .06em; }
.mc { display: flex; gap: 7px; justify-content: center; flex-wrap: wrap; }
.cp { width: 28px; height: 28px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform .1s; }
.cp:hover { transform: scale(1.15); }
.cp.sel { border-color: #fff; }



/* ID badge */
#idbadge {
  position: fixed; top: 10px; right: 10px;
  z-index: 9998;
  background: rgba(0,0,0,.85);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 12px;
  text-align: right;
}
.idlbl { font-size: .55rem; color: #555; text-transform: uppercase; letter-spacing: .06em; display: block; }
.idnum { font-size: 1.5rem; font-weight: 800; color: var(--text); font-family: "Roboto Mono", monospace; letter-spacing: .08em; line-height: 1; }
.cpyid { background: var(--panel); border: 1px solid var(--border); color: var(--adim); border-radius: 6px; padding: 3px 8px; font-size: .65rem; cursor: pointer; margin-left: 6px; font-family: "Roboto Mono", monospace; }
.cpyid:hover { color: var(--text); }

/* Gear */
.gr { position: fixed; top: 10px; left: 10px; z-index: 9998; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px; cursor: pointer; color: #666; display: flex; }
.gr:hover { color: var(--text); }
#st { display: none; position: fixed; top: 48px; left: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; z-index: 9997; width: 220px; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 28px rgba(0,0,0,.8); }
.sl { font-size: .62rem; font-weight: 700; color: #555; display: block; margin-top: 12px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .06em; }
.sl:first-child { margin-top: 0; }
#st select { width: 100%; padding: 5px 7px; border-radius: 6px; background: var(--panel); color: var(--text); border: 1px solid var(--border); font-family: inherit; font-size: .8rem; }
.cg { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; }
.sw { width: 100%; aspect-ratio: 1; border-radius: 6px; border: 2px solid transparent; cursor: pointer; }
.sw.ac { border-color: #fff; }
.tr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.tr span { font-size: .8rem; color: var(--text); }
.tg { position: relative; width: 38px; height: 21px; }
.tg input { opacity: 0; width: 0; height: 0; }
.tt { position: absolute; inset: 0; background: #333; border-radius: 20px; cursor: pointer; transition: .2s; }
.tg input:checked + .tt { background: var(--adim); }
.tt:before { content: ""; position: absolute; left: 3px; top: 3px; width: 15px; height: 15px; background: #777; border-radius: 50%; transition: .2s; }
.tg input:checked + .tt:before { transform: translateX(17px); background: var(--text); }

/* Participant count */
#pcnt { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 9998; background: rgba(0,0,0,.75); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; display: flex; align-items: center; gap: 7px; }
#pcnt .pnum { font-size: .82rem; font-weight: 800; color: var(--text); font-family: "Roboto Mono", monospace; min-width: 10px; }

/* Video grid */
#vg { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; padding: 60px 8px 8px; background: #000; width: 100%; min-height: 200px; }
@media (max-width: 600px) { #vg { grid-template-columns: repeat(2,1fr); } }
.vb { position: relative; background: #060d1a; border-radius: 10px; overflow: hidden; aspect-ratio: 16/9; border: 2px solid var(--border); transition: border-color .15s, box-shadow .15s; }
.vb.sp { border-color: var(--uc, #3a7bd5); box-shadow: 0 0 14px var(--uc, #3a7bd5); }
.vb.gl { box-shadow: 0 0 18px var(--acc); }
.vb video { width: 100%; height: 100%; object-fit: cover; display: block; }
.co { display: none; position: absolute; inset: 0; align-items: center; justify-content: center; background: #060d1a; }
.co.show { display: flex; }
.av { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: #000; }
.nt { position: absolute; bottom: 8px; left: 8px; display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,.75); padding: 3px 9px; border-radius: 5px; font-size: 11px; font-weight: 600; color: #ccc; }
.nd { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.vact { position: absolute; top: 6px; right: 6px; display: none; gap: 4px; z-index: 20; }
.vb:hover .vact, .vb:active .vact { display: flex; }
.vabtn { background: rgba(0,0,0,.75); border: 1px solid #444; border-radius: 5px; color: #ccc; cursor: pointer; padding: 3px 6px; font-size: 10px; font-weight: 700; white-space: nowrap; transition: .15s; }
.vabtn:hover { background: rgba(255,255,255,.15); color: #fff; }
.vabtn.mu { background: rgba(180,0,0,.7); border-color: #c00; color: #fff; }

/* Chat */
.cs { background: var(--panel); border-top: 1px solid var(--border); }
.ch { padding: 10px 14px; background: var(--bg); font-size: .75rem; font-weight: 700; color: var(--sub); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .05em; }
#cm { height: 200px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.mw { display: flex; flex-direction: column; max-width: 92%; }
.mw.me { align-self: flex-end; align-items: flex-end; }
.mw.th { align-self: flex-start; align-items: flex-start; }
.mn { font-size: .66rem; font-weight: 700; margin-bottom: 2px; padding: 0 4px; }
.bb { padding: 7px 11px; border-radius: 9px; font-size: .82rem; word-break: break-word; line-height: 1.45; outline: var(--ol) solid var(--acc); }
.mw.me .bb { background: var(--mebg); color: var(--mec); }
.mw.th .bb { background: var(--thbg); color: var(--thc); }
.bb.gl { box-shadow: 0 0 10px var(--acc); }
.bb img { max-width: 100%; border-radius: 4px; margin-top: 4px; display: block; }

/* Link embed */
.link-embed { margin-top: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; max-width: 260px; }
.le-top { padding: 7px 10px 6px; }
.le-domain { font-size: .6rem; color: var(--sub); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
.le-url { font-size: .75rem; font-weight: 600; color: var(--text); line-height: 1.3; word-break: break-all; }
.le-favicon { width: 14px; height: 14px; vertical-align: middle; margin-right: 4px; border-radius: 2px; }
.le-open { display: block; padding: 5px 10px; font-size: .72rem; color: var(--acc); text-decoration: none; border-top: 1px solid var(--border); }
.le-open:hover { background: rgba(58,123,213,.1); }
.le-actions { display: flex; border-top: 1px solid var(--border); }
.le-actions a, .le-actions button {
  flex: 1; padding: 5px 10px; font-size: .72rem; color: var(--acc);
  text-decoration: none; background: none; border: none; cursor: pointer;
  text-align: center; font-family: inherit;
}
.le-actions a:hover, .le-actions button:hover { background: rgba(58,123,213,.1); }
.le-actions .le-divider { width: 1px; background: var(--border); flex: none; }

/* Fullscreen iframe overlay */
#fs-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 99999;
  background: #000;
  flex-direction: column;
}
#fs-overlay.open { display: flex; }
#fs-bar {
  background: #040d1c;
  border-bottom: 1px solid #0d2040;
  padding: 6px 12px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
#fs-domain { font-size: .72rem; color: var(--sub); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#fs-openext {
  font-size: .72rem; color: var(--acc); text-decoration: none;
  padding: 3px 8px; border: 1px solid var(--border); border-radius: 5px;
}
#fs-openext:hover { background: rgba(58,123,213,.15); }
#fs-close {
  background: none; border: none; color: #888; cursor: pointer;
  font-size: 1.2rem; line-height: 1; padding: 2px 6px;
}
#fs-close:hover { color: #fff; }
#fs-frame { flex: 1; border: none; width: 100%; }

/* Chat input */
.ci { padding: 8px; background: var(--bg); display: flex; gap: 6px; align-items: center; border-top: 1px solid var(--border); }
#mi { flex: 1; background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; outline: none; font-size: .84rem; font-family: inherit; }
.il { cursor: pointer; color: #666; display: flex; background: none; border: none; padding: 0; }
.il:hover { color: var(--adim); }

/* Controls bar */
.ctrl { position: sticky; bottom: 0; background: var(--ctrl); display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-top: 1px solid var(--border); gap: 8px; flex-wrap: wrap; }
.bg { display: flex; gap: 6px; align-items: center; }
.cb { display: flex; align-items: center; justify-content: center; cursor: pointer; background: none; border: none; padding: 0; }
.bi { width: 40px; height: 40px; border-radius: 8px; background: var(--panel); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; transition: .2s; color: var(--adim); }
.cb:hover .bi, .cb:active .bi { background: var(--acc); color: #fff; }
.cb.off .bi { background: #3a1010; border-color: #6b2020; color: #ff5555; }
.cb.act .bi { background: var(--acc); color: #fff; }
.ra { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 120px; }
.rb { display: flex; align-items: center; gap: 6px; background: var(--panel); border: 1.5px solid var(--border); border-radius: 8px; padding: 4px 8px; width: 100%; }
#ti { background: transparent; border: none; color: var(--text); flex: 1; outline: none; font-size: .84rem; font-family: inherit; min-width: 0; }
#ti::placeholder { color: #444; }
.jn { background: var(--jbg); color: var(--jc); border: none; padding: 5px 12px; border-radius: 6px; font-weight: 700; font-size: .78rem; cursor: pointer; white-space: nowrap; }
.jn:hover { filter: brightness(1.15); }
.lbt { display: flex; align-items: center; cursor: pointer; background: none; border: none; padding: 0; }
.li { width: 40px; height: 40px; border-radius: 8px; background: #2a1010; border: 1.5px solid #6b2020; display: flex; align-items: center; justify-content: center; color: #ff5555; transition: .2s; }
.li:hover, .li:active { background: #c0392b; border-color: #c0392b; color: #fff; }

/* Cap warning toast */
#capwarn {
  display: none;
  position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
  background: #030c1a;
  border: 1px solid var(--acc);
  border-left: 3px solid var(--acc);
  border-radius: 6px;
  padding: 8px 18px;
  font-size: .78rem;
  color: #c8ddf0;
  font-weight: 600;
  z-index: 99999;
  white-space: nowrap;
  box-shadow: 0 4px 24px rgba(0,0,0,.9);
}
#capwarn .cw-title {
  display: block;
  font-size: .6rem;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--acc);
  font-weight: 800;
  margin-bottom: 2px;
}
</style>
</head>
<body>

<!-- Username modal -->
<div id="um">
  <div class="mb">
    <h2>TafoChat</h2>
    <div class="warn-banner">
      <strong>Call Limit</strong>
      Max 6 people per call. Leave to join another person's call.
    </div>
    <input type="text" id="ui" placeholder="Username" maxlength="20" autocomplete="off">
    <div>
      <div class="color-label">Pick your color</div>
      <div class="mc" id="mc"></div>
    </div>

    <button id="jb" onclick="SS()">Start Session</button>
  </div>
</div>

<!-- Cap warning toast -->
<div id="capwarn">
  <span class="cw-title">Call Limit Reached</span>
  Only 6 people per call — leave first to join another.
</div>

<!-- Gear -->
<div class="gr" onclick="TS()">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</div>

<!-- ID badge -->
<div id="idbadge">
  <span class="idlbl">Your ID</span>
  <span class="idnum" id="myid">——</span>
  <button class="cpyid" onclick="cpyId()" id="cpybtn">copy</button>
</div>

<!-- Participant count -->
<div id="pcnt">
  <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
    <circle cx="7" cy="6" r="3" fill="var(--adim)"/>
    <circle cx="13" cy="6" r="3" fill="var(--sub)"/>
    <path d="M1 16c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="var(--adim)" stroke-width="1.5" fill="none"/>
    <path d="M13 10c2.5.5 5 2.7 5 6" stroke="var(--sub)" stroke-width="1.5" fill="none"/>
  </svg>
  <span class="pnum" id="pnum">1</span>
</div>

<!-- Settings panel -->
<div id="st">
  <span class="sl">Theme</span>
  <div class="cg" id="sg"></div>
  <span class="sl">Effects</span>
  <div class="tr">
    <span>Outline</span>
    <label class="tg"><input type="checkbox" onchange="SO(this.checked)"><div class="tt"></div></label>
  </div>
  <div class="tr">
    <span>Glow</span>
    <label class="tg"><input type="checkbox" onchange="SG(this.checked)"><div class="tt"></div></label>
  </div>
  <span class="sl">Font</span>
  <select onchange="SF(this.value)">
    <option value="df">Default</option>
    <option value="mc2">Minecraft</option>
    <option value="rt">Retro Terminal</option>
    <option value="ob">Orbitron</option>
    <option value="pc">Pacifico</option>
    <option value="bn">Bangers</option>
    <option value="cv">Caveat</option>
    <option value="mn">Mono</option>
    <option value="rj">Rajdhani</option>
  </select>
  <span class="sl">Privacy</span>
  <div class="tr">
    <span>Hide your ID</span>
    <label class="tg"><input type="checkbox" onchange="hideId(this.checked)"><div class="tt"></div></label>
  </div>
</div>

<!-- Video grid -->
<div id="vg"></div>

<!-- Chat -->
<div class="cs">
  <div class="ch">Chat</div>
  <div id="cm"></div>
  <div class="ci">
    <label class="il" title="Send image">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <input type="file" id="ii" style="display:none" accept="image/*" onchange="SI()">
    </label>
    <button class="il" onclick="SL()" title="Send a link">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </button>
    <input type="text" id="mi" placeholder="Message..." onkeydown="if(event.key==='Enter')ST()">
  </div>
</div>

<!-- Controls bar -->
<div class="ctrl">
  <div class="bg">
    <button class="cb" id="mb2" onclick="TM()" title="Mute/Unmute">
      <div class="bi">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
    </button>
    <button class="cb" id="cb2" onclick="TC()" title="Camera on/off">
      <div class="bi">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </div>
    </button>
    <button class="cb" id="sb2" onclick="TSC()" title="Share screen">
      <div class="bi">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
      </div>
    </button>
  </div>
  <div class="ra">
    <div class="rb">
      <input type="text" id="ti" placeholder="Enter room ID">
      <button class="jn" onclick="JR()">Join</button>
    </div>
  </div>
  <button class="lbt" onclick="DC()" title="Leave">
    <div class="li">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </div>
  </button>
</div>

<!-- Fullscreen iframe overlay -->
<div id="fs-overlay">
  <div id="fs-bar">
    <span id="fs-domain"></span>
    <a id="fs-openext" target="_blank" rel="noopener noreferrer">Open in new tab</a>
    <button id="fs-close" onclick="closeFS()">&#x2715;</button>
  </div>
  <iframe id="fs-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<script>
var UC = ["#00e5ff","#ff2d78","#aaff00","#ff7700","#cc44ff","#ffcc00","#00ffaa","#4488ff","#ff4444","#ff99dd","#33ffdd","#aaaaff"];

var TH = [
  {c:"#040d1c",v:{"--bg":"#000000","--panel":"#040d1c","--border":"#0d2040","--ctrl":"#000000","--text":"#ffffff","--sub":"#7a8fa8","--acc":"#3a7bd5","--adim":"#5a9fd8","--mebg":"#0a2448","--mec":"#ffffff","--thbg":"#040d1c","--thc":"#c8ddf0","--jbg":"#3a7bd5","--jc":"#ffffff"}},

  {c:"#ffcc00",v:{"--bg":"#100e00","--panel":"#1c1800","--border":"#3d3200","--ctrl":"#0a0b00","--text":"#ffcc00","--sub":"#bb9900","--acc":"#ffcc00","--adim":"#ddaa00","--mebg":"#cc9900","--mec":"#000","--thbg":"#2d2600","--thc":"#ffcc00","--jbg":"#cc9900","--jc":"#000"}}
];

var FN = {
  df:"system-ui,sans-serif", mc2:"'Press Start 2P',monospace", rt:"'VT323',monospace",
  ob:"'Orbitron',sans-serif", pc:"'Pacifico',cursive", bn:"'Bangers',cursive",
  cv:"'Caveat',cursive", mn:"'Roboto Mono',monospace", rj:"'Rajdhani',sans-serif"
};

// ── State ──
var myU = "", myC = UC[0];
var glowOn = false, myStream = null, peer = null, scrStream = null;
var micOn = true, camOn = true;
var calls = {}, dcs = {}, known = new Set(), selfAn = null, volMap = {};

// ── Build color picker ──
(function() {
  var mcEl = document.getElementById("mc");
  UC.forEach(function(c, i) {
    var d = document.createElement("div");
    d.className = "cp" + (i === 0 ? " sel" : "");
    d.style.background = c;
    d.onclick = function() {
      document.querySelectorAll(".cp").forEach(function(x) { x.classList.remove("sel"); });
      d.classList.add("sel");
      myC = c;
    };
    mcEl.appendChild(d);
  });
})();

// ── Build theme swatches ──
(function() {
  var sgEl = document.getElementById("sg");
  TH.forEach(function(t, i) {
    var s = document.createElement("div");
    s.className = "sw" + (i === 0 ? " ac" : "");
    s.style.background = t.c;
    s.onclick = function() {
      document.querySelectorAll(".sw").forEach(function(x) { x.classList.remove("ac"); });
      s.classList.add("ac");
      AT(t.v);
    };
    sgEl.appendChild(s);
  });
})();

// Enter key on username input
document.getElementById("ui").addEventListener("keydown", function(e) {
  if (e.key === "Enter") SS();
});

// ── Start session ──
function SS() {
  var v = document.getElementById("ui").value.trim();
  if (!v) {
    document.getElementById("ui").style.borderColor = "#f55";
    return;
  }
  myU = v;
  document.getElementById("um").style.display = "none";
  init();
}

// ── Theme / settings ──
function AT(v) {
  var r = document.documentElement.style;
  Object.entries(v).forEach(function(e) { r.setProperty(e[0], e[1]); });
  if (glowOn) AG(true);
}
function SO(on) { document.documentElement.style.setProperty("--ol", on ? "2px" : "0px"); }
function SG(on) { glowOn = on; AG(on); }
function AG(on) {
  document.documentElement.style.setProperty("--glow", on ? "14" : "0");
  document.querySelectorAll(".vb").forEach(function(e) { e.classList.toggle("gl", on); });
  document.querySelectorAll(".bb").forEach(function(e) { e.classList.toggle("gl", on); });
}
function SF(k) {
  document.body.style.fontFamily = FN[k] || FN.df;
  document.body.style.fontSize = k === "mc2" ? "10px" : "";
}
function TS() {
  var s = document.getElementById("st");
  s.style.display = s.style.display === "block" ? "none" : "block";
}

// ── Init ──
async function init() {
  try {
    myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch(e) {
    alert("Please allow camera and mic, then reload.");
    return;
  }
  addLocalBox();
  var myId = Math.floor(100000 + Math.random() * 900000).toString();
  peer = new Peer("tafo-" + myId);
  peer.on("open", function() {
    document.getElementById("myid").textContent = myId;
    known.add(peer.id);
  });
  peer.on("call", function(call) {
    if (calls[call.peer]) { call.answer(myStream); return; }
    if (1 + Object.keys(calls).length >= 6) { showCapWarn(); return; }
    calls[call.peer] = call;
    call.answer(myStream);
    call.on("stream", function(s) { addRemoteBox(s, call.peer); setupVol(s, call.peer); updateCount(); });
    call.on("close", function() { removeBox(call.peer); delete calls[call.peer]; updateCount(); });
    if (!dcs[call.peer] && !known.has(call.peer)) {
      known.add(call.peer);
      setupDC(peer.connect(call.peer, { reliable: true }));
    }
  });
  peer.on("connection", function(conn) { setupDC(conn); });
  peer.on("error", function(e) { console.warn(e); });
  setupSelfVol();
  setInterval(pollVol, 100);
}

// ── Video boxes ──
function addLocalBox() {
  var b = mkBox("v-local", myC);
  var v = document.createElement("video");
  v.autoplay = true; v.playsInline = true;
  v.setAttribute("playsinline", "");
  v.muted = true;
  v.srcObject = myStream;
  v.play().catch(function() {});
  var o = document.createElement("div");
  o.className = "co"; o.id = "o-local";
  o.appendChild(mkAv(myC, myU));
  b.append(v, o, mkNT(myC, myU + " (You)"), mkVAct("local", v, null));
  document.getElementById("vg").appendChild(b);
}

function addRemoteBox(stream, pid) {
  if (document.getElementById("v-" + pid)) {
    var ev = document.querySelector("#v-" + pid + " video");
    if (ev && ev.srcObject !== stream) { ev.srcObject = stream; ev.play().catch(function() {}); }
    return;
  }
  var info = (dcs[pid] && dcs[pid]._pi) || {};
  var col = info.color || UC[Math.floor(Math.random() * UC.length)];
  var nm = info.username || pid.replace("tafo-", "");
  var b = mkBox("v-" + pid, col);
  var v = document.createElement("video");
  v.autoplay = true; v.playsInline = true;
  v.setAttribute("playsinline", "");
  v.srcObject = stream;
  v.play().catch(function() {});
  var o = document.createElement("div");
  o.className = "co"; o.id = "o-" + pid;
  o.appendChild(mkAv(col, nm));
  b.append(v, o, mkNT(col, nm), mkVAct(pid, v, stream));
  document.getElementById("vg").appendChild(b);
}

function mkVAct(pid, vid, stream) {
  var va = document.createElement("div");
  va.className = "vact";
  if (pid !== "local") {
    var muBtn = document.createElement("button");
    muBtn.className = "vabtn";
    muBtn.textContent = "Mute";
    muBtn.onclick = function(e) {
      e.stopPropagation();
      var m = vid.muted = !vid.muted;
      muBtn.textContent = m ? "Unmute" : "Mute";
      muBtn.classList.toggle("mu", m);
    };
    va.appendChild(muBtn);
  }
  return va;
}
function mkBox(id, col) {
  var b = document.createElement("div");
  b.className = "vb" + (glowOn ? " gl" : "");
  b.id = id; b.style.setProperty("--uc", col);
  return b;
}
function mkAv(col, nm) {
  var a = document.createElement("div");
  a.className = "av"; a.style.background = col;
  a.textContent = nm.charAt(0).toUpperCase();
  return a;
}
function mkNT(col, nm) {
  var nt = document.createElement("div"); nt.className = "nt";
  var nd = document.createElement("div"); nd.className = "nd"; nd.style.background = col;
  nt.append(nd, nm); return nt;
}
function removeBox(pid) { var e = document.getElementById("v-" + pid); if (e) e.remove(); }

// ── Peer connections ──
function callPeer(id) {
  if (calls[id] || !myStream) return;
  var call = peer.call(id, myStream);
  if (!call) return;
  calls[id] = call;
  call.on("stream", function(s) { addRemoteBox(s, id); setupVol(s, id); updateCount(); });
  call.on("close", function() { removeBox(id); delete calls[id]; updateCount(); });
}

function setupDC(conn) {
  if (dcs[conn.peer]) return;
  dcs[conn.peer] = conn;
  known.add(conn.peer);
  conn.on("open", function() {
    conn.send({ t: "id", u: myU, c: myC });
    conn.send({ t: "peers", l: Array.from(known) });
    callPeer(conn.peer);
  });
  conn.on("data", function(d) {
    if (d.t === "id") {
      conn._pi = { username: d.u, color: d.c };
      var nt = document.querySelector("#v-" + conn.peer + " .nt");
      if (nt) {
        nt.innerHTML = "";
        var nd = document.createElement("div"); nd.className = "nd"; nd.style.background = d.c;
        nt.append(nd, d.u);
      }
      var av = document.querySelector("#v-" + conn.peer + " .av");
      if (av) { av.style.background = d.c; av.textContent = d.u.charAt(0).toUpperCase(); }
    } else if (d.t === "peers") {
      d.l.forEach(function(id) { if (id && id !== peer.id && !known.has(id)) connectTo(id); });
    } else if (d.t === "txt" || d.t === "img" || d.t === "link") {
      showMsg(d, false, conn.peer);
    }
  });
  conn.on("close", function() { delete dcs[conn.peer]; known.delete(conn.peer); removeBox(conn.peer); });
}

function connectTo(id) {
  if (!id || id === peer.id || known.has(id)) return;
  known.add(id);
  setupDC(peer.connect(id, { reliable: true }));
}

function JR() {
  var r = document.getElementById("ti").value.trim();
  if (!r) return;
  if (1 + Object.keys(calls).length >= 6) { showCapWarn(); return; }
  connectTo(r.startsWith("tafo-") ? r : "tafo-" + r);
}

// ── Cap warning ──
var capTimer = null;
function showCapWarn() {
  var w = document.getElementById("capwarn");
  w.style.display = "block";
  if (capTimer) clearTimeout(capTimer);
  capTimer = setTimeout(function() { w.style.display = "none"; }, 3500);
}

// ── Volume ──
function setupSelfVol() {
  try {
    var c = new AudioContext(); selfAn = c.createAnalyser(); selfAn.fftSize = 512;
    c.createMediaStreamSource(myStream).connect(selfAn);
  } catch(e) {}
}
function setupVol(s, pid) {
  try {
    var c = new AudioContext(); var a = c.createAnalyser(); a.fftSize = 512;
    c.createMediaStreamSource(s).connect(a); volMap[pid] = a;
  } catch(e) {}
}
function getVol(a) {
  var d = new Uint8Array(a.frequencyBinCount); a.getByteFrequencyData(d);
  return d.reduce(function(x, y) { return x + y; }, 0) / d.length;
}
function pollVol() {
  var T = 12;
  if (selfAn) { var b = document.getElementById("v-local"); if (b) b.classList.toggle("sp", getVol(selfAn) > T); }
  Object.keys(volMap).forEach(function(pid) {
    var b = document.getElementById("v-" + pid); if (b) b.classList.toggle("sp", getVol(volMap[pid]) > T);
  });
}

// ── Chat ──
function ST() {
  var i = document.getElementById("mi");
  if (!i.value.trim()) return;
  var d = { t: "txt", content: i.value, u: myU, c: myC };
  broadcast(d); showMsg(d, true, null); i.value = "";
}
function SI() {
  var f = document.getElementById("ii").files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function() { var d = { t: "img", content: r.result, u: myU, c: myC }; broadcast(d); showMsg(d, true, null); };
  r.readAsDataURL(f);
}
function SL() {
  var u = prompt("Paste a link:");
  if (!u || !u.trim()) return;
  var url = u.trim();
  if (!url.startsWith("http://") && !url.startsWith("https://")) url = "https://" + url;
  var d = { t: "link", content: url, u: myU, c: myC };
  broadcast(d); showMsg(d, true, null);
}
function broadcast(d) {
  Object.values(dcs).forEach(function(c) { try { if (c.open) c.send(d); } catch(e) {} });
}

// ── Link embed ──
function getDomain(url) {
  try { return new URL(url).hostname.replace("www.", ""); } catch(e) { return url; }
}

function openFS(url) {
  var overlay = document.getElementById("fs-overlay");
  var frame = document.getElementById("fs-frame");
  var domainEl = document.getElementById("fs-domain");
  var extLink = document.getElementById("fs-openext");
  frame.src = url;
  domainEl.textContent = getDomain(url);
  extLink.href = url;
  overlay.classList.add("open");
}
function closeFS() {
  var overlay = document.getElementById("fs-overlay");
  var frame = document.getElementById("fs-frame");
  overlay.classList.remove("open");
  frame.src = "";
}

function buildEmbed(url) {
  var wrap = document.createElement("div");
  wrap.className = "link-embed";

  var top = document.createElement("div");
  top.className = "le-top";

  var domain = document.createElement("div");
  domain.className = "le-domain";
  var fav = document.createElement("img");
  fav.className = "le-favicon";
  fav.src = "https://www.google.com/s2/favicons?domain=" + getDomain(url) + "&sz=32";
  fav.onerror = function() { this.style.display = "none"; };
  domain.appendChild(fav);
  domain.appendChild(document.createTextNode(getDomain(url)));

  var urlText = document.createElement("div");
  urlText.className = "le-url";
  var short = url.replace(/^https?:\/\/(www\.)?/, "");
  urlText.textContent = short.length > 50 ? short.slice(0, 50) + "\u2026" : short;

  top.append(domain, urlText);

  var actions = document.createElement("div");
  actions.className = "le-actions";

  var fsBtn = document.createElement("button");
  fsBtn.textContent = "Preview";
  fsBtn.onclick = function() { openFS(url); };

  var div = document.createElement("div");
  div.className = "le-divider";

  var extLink = document.createElement("a");
  extLink.href = url;
  extLink.target = "_blank";
  extLink.rel = "noopener noreferrer";
  extLink.textContent = "Open \u2192";

  actions.append(fsBtn, div, extLink);
  wrap.append(top, actions);
  return wrap;
}

function showMsg(d, self, pid) {
  var chat = document.getElementById("cm");
  var w = document.createElement("div");
  w.className = "mw " + (self ? "me" : "th");
  var ne = document.createElement("div");
  ne.className = "mn";
  var info = pid && dcs[pid] && dcs[pid]._pi;
  ne.textContent = d.u || (self ? myU : (info && info.username) || "Peer");
  ne.style.color = d.c || (self ? myC : (info && info.color) || "#aaa");
  var bb = document.createElement("div");
  bb.className = "bb" + (glowOn ? " gl" : "");
  if (d.t === "txt") {
    bb.textContent = d.content;
  } else if (d.t === "img") {
    var img = document.createElement("img"); img.src = d.content; bb.appendChild(img);
  } else if (d.t === "link") {
    var a = document.createElement("a");
    a.href = d.content; a.target = "_blank"; a.rel = "noopener noreferrer";
    a.style.cssText = "color:var(--acc);font-size:.76rem;display:block;word-break:break-all;margin-bottom:2px;";
    a.textContent = d.content;
    bb.appendChild(a);
    bb.appendChild(buildEmbed(d.content));
  }
  w.append(ne, bb);
  chat.appendChild(w);
  chat.scrollTop = chat.scrollHeight;
}

// ── Media controls ──
function TM() {
  var t = myStream.getAudioTracks()[0]; if (!t) return;
  micOn = !micOn; t.enabled = micOn;
  document.getElementById("mb2").classList.toggle("off", !micOn);
}
function TC() {
  var t = myStream.getVideoTracks()[0]; if (!t) return;
  camOn = !camOn; t.enabled = camOn;
  document.getElementById("cb2").classList.toggle("off", !camOn);
  var o = document.getElementById("o-local"); if (o) o.classList.toggle("show", !camOn);
}
function cpyId() {
  var el = document.getElementById("myid"); if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(function() {
    var b = document.getElementById("cpybtn"); b.textContent = "copied!";
    setTimeout(function() { b.textContent = "copy"; }, 1500);
  }).catch(function() {});
}
function hideId(on) {
  document.getElementById("idbadge").style.opacity = on ? "0" : "1";
  document.getElementById("idbadge").style.pointerEvents = on ? "none" : "auto";
}
function updateCount() { document.getElementById("pnum").textContent = 1 + Object.keys(calls).length; }

// ── Screen share ──
function getAllPCs() {
  var pcs = [];
  if (!peer || !peer.connections) return pcs;
  Object.keys(peer.connections).forEach(function(pid) {
    var arr = peer.connections[pid]; if (!arr) return;
    arr.forEach(function(conn) { if (conn.type === "media" && conn.peerConnection) pcs.push(conn.peerConnection); });
  });
  return pcs;
}
async function TSC() {
  var btn = document.getElementById("sb2");
  if (scrStream) { stopScr(); return; }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) { alert("Screen share needs Chrome, Edge, or Firefox."); return; }
  try {
    scrStream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: { ideal: 30 }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
  } catch(e) {
    if (e.name !== "AbortError" && e.name !== "NotAllowedError") alert("Screen share failed: " + e.message);
    scrStream = null; return;
  }
  var vt = scrStream.getVideoTracks()[0];
  if (!vt) { scrStream = null; return; }
  var lv = document.querySelector("#v-local video");
  if (lv) { lv.srcObject = scrStream; lv.play().catch(function() {}); }
  getAllPCs().forEach(function(pc) {
    try {
      var senders = pc.getSenders();
      for (var i = 0; i < senders.length; i++) {
        if (senders[i].track && senders[i].track.kind === "video") { senders[i].replaceTrack(vt); break; }
      }
    } catch(e) { console.warn(e); }
  });
  btn.classList.add("act");
  vt.addEventListener("ended", stopScr);
}
function stopScr() {
  if (!scrStream) return;
  try { scrStream.getTracks().forEach(function(t) { t.stop(); }); } catch(e) {}
  scrStream = null;
  var lv = document.querySelector("#v-local video");
  if (lv) { lv.srcObject = myStream; lv.play().catch(function() {}); }
  var ot = myStream && myStream.getVideoTracks()[0];
  if (ot) {
    getAllPCs().forEach(function(pc) {
      try {
        var senders = pc.getSenders();
        for (var i = 0; i < senders.length; i++) {
          if (senders[i].track && senders[i].track.kind === "video") { senders[i].replaceTrack(ot); break; }
        }
      } catch(e) { console.warn(e); }
    });
  }
  document.getElementById("sb2").classList.remove("act");
}

// ── Leave ──
function DC() {
  if (myStream) myStream.getTracks().forEach(function(t) { t.stop(); });
  if (peer) peer.destroy();
  window.close();
}
</script>
